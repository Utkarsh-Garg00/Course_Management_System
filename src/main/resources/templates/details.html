<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Course Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-dark text-white">

<h4>Course Details</h4>

</div>

<div class="card-body">

<p><b>ID:</b> <span th:text="${course.id}"></span></p>

<p><b>Name:</b> <span th:text="${course.name}"></span></p>

<p><b>Duration:</b> <span th:text="${course.duration}"></span></p>

<p><b>Instructor:</b> <span th:text="${course.instructor}"></span></p>

<a href="/courses" class="btn btn-primary">Back</a>

</div>

</div>

</div>

</body>

</html>
