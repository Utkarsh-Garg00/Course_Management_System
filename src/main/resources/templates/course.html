<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Course Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
}

.card{
margin-top:60px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-header bg-primary text-white text-center">

<h4 th:text="${course.id != null} ? 'Update Course' : 'Add Course'"></h4>

</div>

<div class="card-body">

<form th:action="@{/courses/save}" th:object="${course}" method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

<label class="form-label">Course Name</label>

<input type="text" th:field="*{name}" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Duration</label>

<input type="text" th:field="*{duration}" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Instructor</label>

<input type="text" th:field="*{instructor}" class="form-control">

</div>

<button class="btn btn-success w-100">Save Course</button>

<a href="/courses" class="btn btn-secondary w-100 mt-2">Back</a>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
